<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnPassive｜熟齡高階體態與飲食計畫系統</title>
    <style>
        :root { --primary: #2563eb; --secondary: #10b981; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --muted: #64748b; --border: #e2e8f0; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; line-height: 1.6; }
        .container { max-width: 900px; margin: 0 auto; background: var(--card); padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); margin-bottom: 5px; font-size: 26px; }
        .subtitle { text-align: center; color: var(--muted); margin-bottom: 30px; font-size: 15px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .form-group { display: flex; flex-direction: column; }
        label { font-weight: 600; margin-bottom: 8px; font-size: 14px; color: #334155; }
        input, select { padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; background: #f1f5f9; }
        
        button { background: var(--primary); color: white; border: none; padding: 16px; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; margin-bottom: 20px; }
        button:hover { background: #1d4ed8; }
        
        #result-section { display: none; padding-top: 30px; border-top: 2px solid var(--border); }
        .card { background: #f8fafc; padding: 25px; border-radius: 12px; margin-bottom: 25px; border: 1px solid var(--border); border-left: 5px solid var(--primary); }
        .card h3 { margin-top: 0; color: var(--primary); border-bottom: 1px dashed #cbd5e1; padding-bottom: 12px; }
        
        .macro-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; text-align: center; margin-top: 20px; }
        .macro-box { background: white; padding: 20px 10px; border-radius: 10px; border: 1px solid var(--border); }
        .macro-val { font-size: 24px; font-weight: 800; color: var(--text); margin-bottom: 4px; }
        .macro-lbl { font-size: 13px; color: var(--muted); font-weight: 500; }
        
        .tracker-box { background: #f0fdf4; border-left: 5px solid var(--secondary); padding: 20px; border-radius: 12px; margin-bottom: 25px; }
        .tracker-item { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; font-size: 16px; font-weight: 600; color: #166534; }
        
        table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 20px; background: white; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border); font-size: 14.5px; line-height: 1.6; }
        th { background: #e2e8f0; color: #334155; }
        td a { color: #ea580c; text-decoration: none; font-weight: bold; background: #fff7ed; padding: 2px 6px; border-radius: 4px; }
        
        .milestone { text-align: center; font-weight: 600; color: #1e40af; background: #eff6ff; padding: 18px; border-radius: 10px; margin-top: 30px; }
        .timing-box { margin-top: 20px; font-size: 14.5px; color: #334155; background: white; padding: 18px; border-radius: 10px; border: 1px solid var(--border); }
        .meal-option { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px dashed #e2e8f0; }
        .meal-option:last-child { border-bottom: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>EnPassive｜熟齡高階體態與飲食計畫系統</h1>
    <p class="subtitle">專屬 52 歲的科學化增肌、無乳糖飲食與週末混合式重訓</p>

    <div class="grid">
        <div class="form-group"><label>年齡 (歲)</label><input type="number" id="age" value="52"></div>
        <div class="form-group"><label>身高 (cm)</label><input type="number" id="height" value="164"></div>
        <div class="form-group"><label>體重 (kg)</label><input type="number" id="weight" value="57" step="0.1"></div>
        <div class="form-group">
            <label>訓練強度評估</label>
            <select id="activity">
                <option value="1.2">久坐</option>
                <option value="1.375">輕度</option>
                <option value="1.55" selected>中度 (每週4天)</option>
                <option value="1.725">高度</option>
            </select>
        </div>
        <div class="form-group">
            <label>主要目標</label>
            <select id="goal">
                <option value="muscle" selected>乾淨增肌</option>
                <option value="fatloss">高效減脂</option>
            </select>
        </div>
        <div class="form-group">
            <label>專屬訓練模式</label>
            <select id="workoutMode">
                <option value="mode_a" selected>週末重裝＋平日居家</option>
                <option value="mode_b">全居家啞鈴模式</option>
            </select>
        </div>
    </div>

    <button onclick="generatePlan()">🚀 啟動我的科學化課表</button>

    <div id="result-section">
        <div class="tracker-box">
            <h3 style="margin-top:0; color: #047857;">✅ 每日紀律打卡</h3>
            <label class="tracker-item"><input type="checkbox"> 💧 飲水量達標 3.5 公升</label>
            <label class="tracker-item"><input type="checkbox"> 💊 補充男性善存與魚油</label>
            <label class="tracker-item"><input type="checkbox"> 🛌 睡眠達 7-8 小時</label>
        </div>

        <div class="card">
            <h3>🍽️ 巨量營養素與飲食</h3>
            <div class="macro-grid">
                <div class="macro-box"><div class="macro-val" id="t-cal" style="color:#2563eb;">0</div><div class="macro-lbl">總熱量(kcal)</div></div>
                <div class="macro-box"><div class="macro-val" id="t-pro" style="color:#ea580c;">0</div><div class="macro-lbl">蛋白質(g)</div></div>
                <div class="macro-box"><div class="macro-val" id="t-fat" style="color:#047857;">0</div><div class="macro-lbl">脂肪(g)</div></div>
                <div class="macro-box"><div class="macro-val" id="t-car" style="color:#7e22ce;">0</div><div class="macro-lbl">碳水(g)</div></div>
            </div>
            <div id="meal-timing" class="timing-box"></div>
        </div>

        <div class="card">
            <h3 id="workout-title">🏋️‍♂️ 專屬訓練課表</h3>
            <div style="overflow-x: auto;">
                <table id="workout-table">
                    <thead><tr><th style="width: 15%;">天數</th><th style="width: 10%;">類型</th><th style="width: 20%;">當日重點</th><th style="width: 55%;">建議動作 (點擊 🎥 觀看教學)</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div class="milestone" id="milestone-text"></div>
    </div>
</div>

<script src="data.js"></script>
<script>
    function renderMealOptions(title, options) {
        let html = `<strong>📍 ${title} (請擇一)：</strong><div style="margin-top:5px;">`;
        options.forEach(opt => html += `<div class="meal-option"><span style="font-weight:bold;">✔️ ${opt.name}</span><br><span style="color:var(--muted); font-size:13px;">${opt.desc}</span></div>`);
        return html + `</div>`;
    }

    function generatePlan() {
        const age = parseFloat(document.getElementById('age').value);
        const height = parseFloat(document.getElementById('height').value);
        const weight = parseFloat(document.getElementById('weight').value);
        const activity = parseFloat(document.getElementById('activity').value);
        const goal = document.getElementById('goal').value;
        const mode = document.getElementById('workoutMode').value;

        const bmr = (10 * weight) + (6.25 * height) - (5 * age) + 5;
        const tdee = bmr * activity;
        let targetCal = goal === 'muscle' ? tdee + 350 : tdee - 400;

        const proteinGrams = Math.round(weight * 2.0);
        const fatGrams = Math.round((targetCal * 0.28) / 9);
        const carbsGrams = Math.round((targetCal - (proteinGrams * 4) - (fatGrams * 9)) / 4);

        document.getElementById('t-cal').innerText = Math.round(targetCal);
        document.getElementById('t-pro').innerText = `${proteinGrams}g`;
        document.getElementById('t-fat').innerText = `${fatGrams}g`;
        document.getElementById('t-car').innerText = `${carbsGrams}g`;

        // 飲食
        let timingStr = renderMealOptions("早餐", dietData.breakfast) + '<br>' +
                        renderMealOptions("午餐", dietData.lunch) + '<br>' +
                        renderMealOptions("晚餐", dietData.dinner) + '<br>' +
                        renderMealOptions("點心", dietData.snack);
        document.getElementById('meal-timing').innerHTML = timingStr;

        // 訓練 + Gemini 防呆機制
        const wkData = workoutData[mode];
        document.getElementById('workout-title').innerHTML = `🏋️‍♂️ ${wkData.name}`;
        
        const tbody = document.querySelector('#workout-table tbody');
        const rowsHtml = wkData.schedule.map(day => {
            let typeColor = day.type === '重訓' ? '#dbeafe' : '#d1fae5';
            let typeTextColor = day.type === '重訓' ? '#1e40af' : '#065f46';
            let routineContent = day.routine ? day.routine : '<span style="color:red; font-weight:bold;">載入失敗，請確認 data.js 是否正確貼上</span>';
            
            return `<tr>
                <td><strong>${day.day}</strong></td>
                <td><span style="background:${typeColor}; color:${typeTextColor}; padding:4px 10px; border-radius:6px; font-size:13px; font-weight:bold;">${day.type}</span></td>
                <td><span style="color:#475569; font-weight:600;">${day.focus}</span></td>
                <td>${routineContent}</td>
            </tr>`;
        }).join('');
        
        tbody.innerHTML = rowsHtml;

        // 里程碑
        document.getElementById('milestone-text').innerHTML = goal === 'muscle' 
            ? "⏱️ 【務實增肌心法】半年增加 1-2kg 純肌肉已是極限，請專注力量進步與鏡子裡的變化！" 
            : "⏱️ 【減脂期預期】每週體重下降約 0.5%，力量不掉就是成功！";

        document.getElementById('result-section').style.display = 'block';
    }
</script>
</body>
</html>
